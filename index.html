<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Render | Gabriel</title>

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family: Arial, sans-serif;
  background:#070707;
  color:#fff;
  overflow-x:hidden;
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.loader-text{
  font-size:20px;
  letter-spacing:3px;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{opacity:0.3}
  50%{opacity:1}
  100%{opacity:0.3}
}

/* CURSOR */
.cursor{
  width:20px;height:20px;
  border:2px solid #00ff88;
  border-radius:50%;
  position:fixed;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition:0.1s;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  background:transparent;
  transition:0.3s;
  z-index:1000;
}
nav.scrolled{
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
}
nav a{color:#fff;margin-left:20px;text-decoration:none}

/* HERO */
header{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}
header::after{
  content:"";
  position:absolute;
  width:100%;height:100%;
  background:rgba(0,0,0,0.75);
}
.hero{position:relative;z-index:1;max-width:700px}
.hero h1{font-size:55px}
.hero p{color:#ccc;margin-top:10px}

.btn{
  margin-top:25px;
  display:inline-block;
  padding:14px 30px;
  background:linear-gradient(45deg,#00ff88,#00c853);
  color:#000;
  border-radius:6px;
  text-decoration:none;
  transition:0.3s;
}
.btn:hover{transform:scale(1.08)}

/* SECTIONS */
section{padding:100px 20px;text-align:center}
h2{margin-bottom:40px}

/* CARDS */
.services{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.card{
  padding:30px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-12px) scale(1.02);
}

/* PORTFOLIO */
.portfolio{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
}
.portfolio img{
  width:100%;
  border-radius:12px;
  transition:0.5s;
}
.portfolio img:hover{
  transform:scale(1.08);
}

/* WHATS FLOAT */
.whats{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  font-size:20px;
  text-decoration:none;
}

/* FOOTER */
footer{padding:30px;color:#777;text-align:center}
</style>
</head>

<body>

<div id="loader"><div class="loader-text">CARREGANDO...</div></div>
<div class="cursor"></div>

<nav id="nav">
  <h2>3D Render</h2>
  <div>
    <a href="#">Início</a>
    <a href="#servicos">Serviços</a>
    <a href="#portfolio">Portfólio</a>
  </div>
</nav>

<header>
  <div class="hero" data-aos="fade-up">
    <h1>Impacto Visual em 3D</h1>
    <p>Renderizações realistas que vendem seu projeto antes mesmo da obra começar</p>
    <a class="btn" href="https://wa.me/45999685595">Solicitar Orçamento</a>
  </div>
</header>

<section id="servicos">
<h2 data-aos="fade-up">Serviços</h2>

<div class="services">
<div class="card" data-aos="zoom-in">Render Externo</div>
<div class="card" data-aos="zoom-in" data-aos-delay="100">Render Interno</div>
<div class="card" data-aos="zoom-in" data-aos-delay="200">Planta Humanizada</div>
</div>
</section>

<section id="portfolio">
<h2 data-aos="fade-up">Portfólio</h2>

<div class="portfolio">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">
<img src="https://images.unsplash.com/photo-1600573472550-8090b5e0745e">
</div>
</section>

<footer>© 2026 - Gabriel</footer>

<a class="whats" href="https://wa.me/45999685595">💬</a>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init({duration:1000,once:true});

// LOADER
window.onload = () => {
  document.getElementById("loader").style.display="none";
}

// NAV SCROLL
window.addEventListener("scroll",()=>{
  document.getElementById("nav").classList.toggle("scrolled",window.scrollY>50)
})

// CURSOR
const cursor = document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

<!-- Vercel Web Analytics -->
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>

</body>
</html>
