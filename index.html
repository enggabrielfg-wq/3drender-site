<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Render 3D Profissional | Arquitetura e Interiores</title>

<meta name="description" content="Renderização 3D profissional para arquitetura, interiores e fachadas. Imagens realistas que valorizam seu projeto.">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial;
  background:#070707;
  color:#fff;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}
nav a{color:#fff;margin-left:20px;text-decoration:none}

/* HERO */
header{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero h1{font-size:50px}
.btn{
  margin-top:20px;
  padding:14px 30px;
  background:#00ff88;
  color:#000;
  text-decoration:none;
}

/* SECTIONS */
section{padding:100px 20px;text-align:center}

/* REVISTA */
.revista-container{
  display:flex;
  justify-content:center;
  margin-top:40px;
}

#flipbook{
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.page{
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#111;
}

.page img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.capa{
  background:linear-gradient(135deg,#00ff88,#00c853);
  color:#000;
}

.controls button{
  margin:10px;
  padding:10px 20px;
  border:none;
  background:#00ff88;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <h2>3D Render</h2>
  <div>
    <a href="#">Início</a>
    <a href="#portfolio">Portfólio</a>
  </div>
</nav>

<header>
  <div class="hero">
    <h1>Renderização 3D Profissional</h1>
    <p>Imagens que vendem seu projeto</p>
    <a class="btn" href="https://wa.me/45999685595">Orçamento</a>
  </div>
</header>

<section id="portfolio">
  <h2>Apresentação de Projeto</h2>

  <div class="revista-container">
    <div id="flipbook"></div>
  </div>

  <div class="controls">
    <button onclick="pageFlip.flipPrev()">⬅️</button>
    <button onclick="pageFlip.flipNext()">➡️</button>
  </div>
</section>

<footer>© 2026 - Gabriel</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
const pageFlip = new St.PageFlip(
  document.getElementById("flipbook"),
  {
    width: 400,
    height: 550,
    showCover: true,
    maxShadowOpacity: 0.5
  }
);

pageFlip.loadFromHTML([
  `<div class="page capa">
      <h1>Projeto Residencial</h1>
      <p>Renderização 3D</p>
  </div>`,

  `<div class="page"><img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c"></div>`,
  `<div class="page"><img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c"></div>`,
  `<div class="page"><img src="https://images.unsplash.com/photo-1600573472550-8090b5e0745e"></div>`,

  `<div class="page">
      <h2>Gostou do projeto?</h2>
      <a href="https://wa.me/45999685595">Fale comigo</a>
  </div>`
]);
</script>

</body>
</html>
